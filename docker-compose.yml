# ローカル開発用 PostgreSQL（Supabase に繋がない時のフォールバック）
# 使うときは application.properties の値を上書きする環境変数を設定する:
#   export SPRING_DATASOURCE_URL='jdbc:postgresql://localhost:5432/job_hunting'
#   export SPRING_DATASOURCE_USERNAME=postgres
#   export SUPABASE_DB_PASSWORD=postgres
services:
  postgres:
    image: postgres:16
    container_name: job-hunt-postgres
    environment:
      POSTGRES_DB: job_hunting
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - job_hunt_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 3s
      timeout: 5s
      retries: 12
      start_period: 5s

volumes:
  job_hunt_postgres_data:
