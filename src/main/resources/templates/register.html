<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>新規登録 | 内定ホイホイ</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<div class="container" style="max-width: 560px;">
    <div class="header">
        <h1>新規登録</h1>
        <a th:href="@{/login}" class="btn btn-secondary">ログインへ戻る</a>
    </div>

    <div th:if="${error}" style="margin-bottom: 1rem; color: #fca5a5;" th:text="${error}"></div>

    <form th:action="@{/register}" method="post">
        <div style="margin-bottom: 0.8rem;">
            <label for="username">ユーザー名</label>
            <input id="username" name="username" type="text" required autocomplete="username"
                   th:value="${username}"
                   style="width: 100%; padding: 0.65rem; border-radius: 10px; border: 1px solid rgba(255,215,0,0.25); background: rgba(15,23,42,0.6); color: #e2e8f0;">
        </div>
        <div style="margin-bottom: 1.2rem;">
            <label for="password">パスワード</label>
            <input id="password" name="password" type="password" required autocomplete="new-password"
                   style="width: 100%; padding: 0.65rem; border-radius: 10px; border: 1px solid rgba(255,215,0,0.25); background: rgba(15,23,42,0.6); color: #e2e8f0;">
        </div>

        <button type="submit" class="btn" style="width: 100%;">登録する</button>
    </form>
</div>
</body>
</html>
