<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>応募先編集 | Job Applications</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
    <div class="container" style="max-width: 600px;">
        <div class="header">
            <h1>ターゲットを編集</h1>
        </div>

        <form th:action="@{/applications/edit/{id}(id=${jobApplication.id})}" th:object="${jobApplication}" method="post">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
            <input type="hidden" th:field="*{id}" />

            <div class="form-group">
                <label for="companyName">会社名 <span style="color: var(--danger-color);">*</span></label>
                <input type="text" id="companyName" th:field="*{companyName}" placeholder="株式会社サンプル">
                <span class="error-message" th:if="${#fields.hasErrors('companyName')}" th:errors="*{companyName}"></span>
            </div>

            <div class="form-group">
                <label for="status">ステータス <span style="color: var(--danger-color);">*</span></label>
                <select id="status" th:field="*{status}">
                    <option value="">選択してください</option>
                    <option value="応募前">応募前</option>
                    <option value="書類選考中">書類選考中</option>
                    <option value="一次面接">一次面接</option>
                    <option value="二次面接">二次面接</option>
                    <option value="最終面接">最終面接</option>
                    <option value="内定">内定</option>
                    <option value="お見送り">お見送り</option>
                    <option value="辞退">辞退</option>
                </select>
                <span class="error-message" th:if="${#fields.hasErrors('status')}" th:errors="*{status}"></span>
            </div>

            <div class="form-group">
                <label for="interviewDate">日付</label>
                <input type="date" id="interviewDate" th:field="*{interviewDate}">
                <p class="form-hint">面接日やイベント日など。一覧の日付表示の基準にも使われます。</p>
            </div>

            <div class="form-group">
                <label for="memo">メモ</label>
                <textarea id="memo" th:field="*{memo}" rows="4" placeholder="特記事項、当日の内容・気づきなど"></textarea>
                <p class="form-hint">下のチェックを入れて保存すると、同じ内容で履歴にも1件追加されます。</p>
            </div>

            <div class="form-group edit-record-history-row">
                <label class="edit-record-history-label">
                    <input type="checkbox" name="recordHistory" value="true">
                    <span>この内容を<strong>履歴にも追加</strong>する</span>
                </label>
            </div>

            <div class="actions">
                <button type="submit" class="btn">保存する</button>
                <a th:href="@{/applications}" class="btn btn-secondary">一覧へ</a>
            </div>
        </form>

        <div th:if="${jobApplication.jobHistories != null and !#lists.isEmpty(jobApplication.jobHistories)}" class="edit-registered-history-block">
            <h3>登録済み履歴</h3>
            <div th:each="h : ${jobApplication.jobHistories}" class="history-registered-row">
                <div class="history-registered-body">
                    <div style="font-weight: 700;">
                        <th:block th:if="${h.eventDate != null}">
                            <span th:text="${#temporals.format(h.eventDate, 'yyyy年M月d日') + ' - '}"></span>
                        </th:block>
                        <span th:text="${h.action}"></span>
                    </div>
                    <div th:if="${h.note != null and !#strings.isEmpty(h.note)}" style="opacity: 0.9;" th:text="${h.note}"></div>
                </div>
                <div class="history-registered-actions">
                    <a th:href="@{/applications/edit/{jid}/history/{hid}(jid=${jobApplication.id},hid=${h.id})}"
                       class="btn btn-secondary action-btn">編集</a>
                    <form th:action="@{/applications/edit/{jid}/history/{hid}/delete(jid=${jobApplication.id},hid=${h.id})}"
                          method="post"
                          style="display:inline;"
                          onsubmit="return confirm('この履歴を削除しますか？');">
                        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                        <button type="submit" class="btn btn-delete action-btn">削除</button>
                    </form>
                </div>
            </div>
        </div>
    </div>

</body>
</html>
