<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>応募先編集 | Job Applications</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
    <div class="container" style="max-width: 600px;">
        <div class="header">
            <h1>ターゲットを編集</h1>
        </div>
        
        <form th:action="@{/applications/edit/{id}(id=${jobApplication.id})}" th:object="${jobApplication}" method="post">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
            <input type="hidden" th:field="*{id}" />
            <div class="form-group">
                <label for="companyName">会社名 <span style="color: var(--danger-color);">*</span></label>
                <input type="text" id="companyName" th:field="*{companyName}" placeholder="株式会社サンプル">
                <span class="error-message" th:if="${#fields.hasErrors('companyName')}" th:errors="*{companyName}"></span>
            </div>
            
            <div class="form-group">
                <label for="status">ステータス <span style="color: var(--danger-color);">*</span></label>
                <select id="status" th:field="*{status}">
                    <option value="">選択してください</option>
                    <option value="応募前">応募前</option>
                    <option value="書類選考中">書類選考中</option>
                    <option value="一次面接">一次面接</option>
                    <option value="二次面接">二次面接</option>
                    <option value="最終面接">最終面接</option>
                    <option value="内定">内定</option>
                    <option value="お見送り">お見送り</option>
                    <option value="辞退">辞退</option>
                </select>
                <span class="error-message" th:if="${#fields.hasErrors('status')}" th:errors="*{status}"></span>
            </div>
            
            <div class="form-group">
                <label for="interviewDate">日付</label>
                <input type="date" id="interviewDate" th:field="*{interviewDate}">
            </div>
            
            <div class="form-group">
                <label for="memo">メモ</label>
                <textarea id="memo" th:field="*{memo}" rows="4" placeholder="特記事項や準備することなど..."></textarea>
            </div>
            
            <div class="actions">
                <button type="submit" class="btn">更新する</button>
                <a th:href="@{/applications}" class="btn btn-secondary">キャンセル</a>
            </div>
        </form>

        <hr style="margin: 2rem 0; border-color: rgba(255, 215, 0, 0.3);">

        <h2 style="margin-top: 0;">履歴を追加</h2>
        <form th:action="@{/applications/{id}/history(id=${jobApplication.id})}" method="post">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
            <div class="form-group">
                <label for="action">ステータス <span style="color: var(--danger-color);">*</span></label>
                <select id="action" name="action" required>
                    <option value="">選択してください</option>
                    <option value="応募前">応募前</option>
                    <option value="書類選考中">書類選考中</option>
                    <option value="一次面接">一次面接</option>
                    <option value="二次面接">二次面接</option>
                    <option value="最終面接">最終面接</option>
                    <option value="内定">内定</option>
                    <option value="お見送り">お見送り</option>
                    <option value="辞退">辞退</option>
                </select>
            </div>

            <div class="form-group">
                <label for="eventDate">日付</label>
                <input type="date" id="eventDate" name="eventDate">
            </div>

            <div class="form-group">
                <label for="note">メモ</label>
                <textarea id="note" name="note" rows="3" placeholder="当日の内容・気づき"></textarea>
            </div>

            <div class="actions">
                <button type="submit" class="btn">履歴を追加</button>
                <a th:href="@{/applications}" class="btn btn-secondary">一覧に戻る</a>
            </div>
        </form>

        <div th:if="${jobApplication.jobHistories != null and !#lists.isEmpty(jobApplication.jobHistories)}" style="margin-top: 1.5rem;">
            <h3>登録済み履歴</h3>
            <div th:each="h : ${jobApplication.jobHistories}" style="border-top: 1px solid rgba(255, 215, 0, 0.2); padding: 0.7rem 0;">
                <div style="font-weight: 700;" th:text="${#temporals.format(h.eventDate, 'yyyy年M月d日') + ' - ' + h.action}"></div>
                <div th:if="${h.note != null and !#strings.isEmpty(h.note)}" style="opacity: 0.9;" th:text="${h.note}"></div>
            </div>
        </div>
    </div>

</body>
</html>
