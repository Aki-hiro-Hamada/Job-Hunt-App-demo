<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>履歴の編集 | Job Applications</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
    <div class="container" style="max-width: 600px;">
        <div class="header">
            <h1>履歴の編集</h1>
            <a th:href="@{/applications/edit/{id}(id=${jobApplication.id})}" class="btn btn-secondary">応募先編集に戻る</a>
        </div>

        <p style="opacity: 0.9; margin-bottom: 1.25rem;" th:text="${jobApplication.companyName}">会社名</p>

        <form th:action="@{/applications/edit/{jid}/history/{hid}(jid=${jobApplication.id},hid=${jobHistory.id})}" method="post">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
            <div class="form-group">
                <label for="action">ステータス <span style="color: var(--danger-color);">*</span></label>
                <select id="action" name="action" required>
                    <option value="">選択してください</option>
                    <option value="応募前" th:selected="${jobHistory.action == '応募前'}">応募前</option>
                    <option value="書類選考中" th:selected="${jobHistory.action == '書類選考中'}">書類選考中</option>
                    <option value="一次面接" th:selected="${jobHistory.action == '一次面接'}">一次面接</option>
                    <option value="二次面接" th:selected="${jobHistory.action == '二次面接'}">二次面接</option>
                    <option value="最終面接" th:selected="${jobHistory.action == '最終面接'}">最終面接</option>
                    <option value="内定" th:selected="${jobHistory.action == '内定'}">内定</option>
                    <option value="お見送り" th:selected="${jobHistory.action == 'お見送り'}">お見送り</option>
                    <option value="辞退" th:selected="${jobHistory.action == '辞退'}">辞退</option>
                </select>
            </div>

            <div class="form-group">
                <label for="eventDate">日付</label>
                <input type="date" id="eventDate" name="eventDate"
                       th:value="${jobHistory.eventDate != null ? #temporals.format(jobHistory.eventDate, 'yyyy-MM-dd') : ''}">
            </div>

            <div class="form-group">
                <label for="note">メモ</label>
                <textarea id="note" name="note" rows="3" placeholder="当日の内容・気づき"
                          th:text="${jobHistory.note != null ? jobHistory.note : ''}"></textarea>
            </div>

            <div class="actions">
                <button type="submit" class="btn">保存する</button>
                <a th:href="@{/applications/edit/{id}(id=${jobApplication.id})}" class="btn btn-secondary">キャンセル</a>
            </div>
        </form>
    </div>
</body>
</html>
