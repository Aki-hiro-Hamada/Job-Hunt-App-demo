# Render 等は PORT を注入。ローカルは 8081 のまま
server.port=${PORT:8081}

# Render のリバースプロキシ（X-Forwarded-*）を解釈し、リダイレクトやリンクが https になるようにする
server.forward-headers-strategy=framework

# MongoDB Atlas（Render では Environment に必ずどちらかを設定）
# - MONGODB_URI（任意名）または Spring 標準の SPRING_DATA_MONGODB_URI のどちらでも可
# - 空の MONGODB_URI だけが残っていると接続文字列が空になり起動失敗するため、MongoConnectionUriEnvironmentPostProcessor で実体のある方へ寄せる
# URI が ...mongodb.net/? のように DB 名を含まない場合、Spring は「Database name must not be empty」で落ちるため database を明示する
# Spring標準変数があればそれを優先（Render側の設定ゆれでの取り込みミス対策）
spring.data.mongodb.uri=${SPRING_DATA_MONGODB_URI:${MONGODB_URI:mongodb://localhost:27017}}
spring.data.mongodb.database=${SPRING_DATA_MONGODB_DATABASE:job_hunting}

# --- PostgreSQL（未使用・MongoDB 移行済み。必要ならコメントを外して Mongo 行を止める）---
