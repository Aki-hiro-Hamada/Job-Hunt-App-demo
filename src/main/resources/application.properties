# Render 等は PORT を注入。ローカルは 8081 のまま
server.port=${PORT:8081}

# Render のリバースプロキシ（X-Forwarded-*）を解釈し、リダイレクトやリンクが https になるようにする
server.forward-headers-strategy=framework

# --- PostgreSQL（Supabase: Session pooler）---
# IPv6 限定の Direct connection (db.xxx.supabase.co) ではなく、必ず Pooler 経由を使う。
# パスワードのみ環境変数 SUPABASE_DB_PASSWORD で渡す（リポジトリには値を入れない）。
# URL / username 自体を環境変数で上書きする場合は SPRING_DATASOURCE_URL / SPRING_DATASOURCE_USERNAME を設定する。
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://aws-1-ap-northeast-1.pooler.supabase.com:5432/postgres?sslmode=require}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:postgres.wtgeyumzcwzoshaonhwv}
spring.datasource.password=${SUPABASE_DB_PASSWORD:}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.open-in-view=false
spring.jpa.show-sql=false

# HikariCP（Supabase の Session pooler は短い接続維持が向く）
spring.datasource.hikari.maximum-pool-size=5
spring.datasource.hikari.connection-timeout=10000

# --- ローカル実行 ---
# 1) SUPABASE_DB_PASSWORD を環境変数で渡す:
#      export SUPABASE_DB_PASSWORD='＜Supabase のパスワード＞'
# 2) アプリ起動: ./mvnw spring-boot:run  （または ./run-local.sh）
# ブラウザ: http://localhost:8081/login（トップのログイン画面）→ 初回は /register でユーザー登録
#
# 一覧 UI のみ未ログインで確認（DB 失敗時は空表示）— ローカル試すときだけ true（本番では必ず false）
jobapp.preview-list-without-auth=false

# またはプロファイル dev: ./mvnw spring-boot:run -Dspring-boot.run.arguments=--spring.profiles.active=dev
# → http://localhost:8081/applications
